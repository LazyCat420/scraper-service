version: "3.8"

services:
  scraper-service:
    image: scraper-service:latest
    container_name: scraper-service
    ports:
      - "8001:8001"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
