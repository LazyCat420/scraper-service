services:
  scraper-service:
    image: ${IMAGE_NAME:-scraper-service}:latest
    container_name: ${IMAGE_NAME:-scraper-service}
    ports:
      - "${PORT:-8001}:8001"
    env_file: .env
    environment:
      - TZ=America/Los_Angeles
    volumes:
      - ./cookies.txt:/app/cookies.txt:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          # Chromium is hungry; 2 uvicorn workers each boot their own browser.
          memory: 4G
